<!DOCTYPE html>
<html style="scroll-behavior:smooth;">

<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body {
  margin: 0;
  background: black; /* simple background */
  color: white;
  text-align: center;
  font-family: Arial;
  overflow-x: hidden;
}

/* Responsive */
@media (max-width: 600px) {
  h1 { font-size: 24px; }
  .profile { width: 150px; height:150px; }
}

/* Photo */
.profile {
  width: 200px;
  height: 200px;
  border-radius: 50%;
  object-fit: cover;
  box-shadow: 0px 0px 25px orange;
}

/* Heart Beat */
.heart {
  font-size: 40px;
  animation: beat 1s infinite;
}
@keyframes beat {
  50% { transform: scale(1.3); }
}

/* Heart Rain */
.heart-fall {
  position: fixed;
  top: -10px;
  color: red;
  font-size: 20px;
  animation: fall 5s linear infinite;
}
@keyframes fall {
  100% { transform: translateY(100vh); }
}

/* Fireworks */
.firework {
  position: fixed;
  width: 5px;
  height: 5px;
  background: yellow;
  border-radius: 50%;
  animation: explode 1s ease-out infinite;
}
@keyframes explode {
  100% { transform: scale(15); opacity:0; }
}

/* Button */
.btn {
  padding: 10px 20px;
  background: red;
  border: none;
  border-radius: 20px;
  color: white;
  margin: 5px;
}

/* Popup */
#popupBox {
  display: none;
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  background: rgba(0,0,0,0.8);
  padding: 20px;
  border-radius: 20px;
  box-shadow: 0 0 25px red;
  z-index: 9999;
}

/* Overlay */
#overlay {
  display: none;
  position: fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background: rgba(0,0,0,0.6);
  z-index: 9998;
}

</style>
</head>

<body>

<h1>Hi Monisha 🥰</h1>

<img src="sanjai.jpg.jpg" class="profile">

<div class="heart">❤️</div>

<p>namba love website 😍</p>

<audio id="mysong">
  <source src="song.mp3.mp3" type="audio/mpeg">
</audio>

<br>

<button class="btn" onclick="playAll()">Play 💘</button>
<button class="btn" onclick="stopSong()">Stop ⛔</button>

<br><br>

<a href="#bottom">Scroll Down ⬇️</a>

<div style="height:1000px;"></div>

<h2 id="bottom">I Love You Monisha 💖</h2>

<!-- Overlay -->
<div id="overlay"></div>

<!-- Popup -->
<div id="popupBox">
  <h2>I Love You Monisha ❤️💘</h2>
  <button onclick="closePopup()">Close ❌</button>
</div>

<!-- Heart Rain -->
<div class="heart-fall" style="left:10%;">❤️</div>
<div class="heart-fall" style="left:30%; animation-delay:1s;">❤️</div>
<div class="heart-fall" style="left:50%; animation-delay:2s;">❤️</div>
<div class="heart-fall" style="left:70%; animation-delay:3s;">❤️</div>
<div class="heart-fall" style="left:90%; animation-delay:4s;">❤️</div>

<!-- Fireworks -->
<div class="firework" style="top:30%; left:40%;"></div>
<div class="firework" style="top:60%; left:70%; animation-delay:0.5s;"></div>
<div class="firework" style="top:75%; left:20%; animation-delay:1s;"></div>

<script>

function playAll() {
  document.getElementById("mysong").play();
  document.getElementById("popupBox").style.display = "block";
  document.getElementById("overlay").style.display = "block";
}

function stopSong() {
  var song = document.getElementById("mysong");
  song.pause();
  song.currentTime = 0;
}

function closePopup() {
  document.getElementById("popupBox").style.display = "none";
  document.getElementById("overlay").style.display = "none";
}

</script>

</body>
</html>
