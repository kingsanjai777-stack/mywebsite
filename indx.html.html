<!DOCTYPE html>
<html style="scroll-behavior:smooth;">

<head>
<style>

body {
  background: black;
  color: white;
  text-align: center;
  overflow-x: hidden;
  font-family: Arial;
}

/* Photo */
.profile {
  width: 200px;
  height: 200px;
  border-radius: 50%;
  object-fit: cover;
  box-shadow: 0px 0px 25px orange;
}

/* Heart Beat */
.heart {
  font-size: 50px;
  animation: beat 1s infinite;
}

@keyframes beat {
  0% { transform: scale(1); }
  50% { transform: scale(1.3); }
  100% { transform: scale(1); }
}

/* Heart Rain */
.heart-fall {
  position: fixed;
  top: -10px;
  color: red;
  font-size: 20px;
  animation: fall 5s linear infinite;
}

@keyframes fall {
  0% { transform: translateY(0); }
  100% { transform: translateY(100vh); }
}

/* Button */
.btn {
  padding: 12px 25px;
  background: red;
  color: white;
  border-radius: 25px;
  border: none;
}

/* Popup */
#popupBox {
  display: none;
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  background: black;
  padding: 25px;
  border-radius: 20px;
  box-shadow: 0 0 30px red;
}

/* Typing Effect */
#typing {
  font-size: 22px;
  border-right: 2px solid white;
  display: inline-block;
  white-space: nowrap;
  overflow: hidden;
}

</style>
</head>

<body>

<h1>Hi Monisha ❤️</h1>

<img src="sanjai.jpg.jpg" class="profile">

<div class="heart">❤️</div>

<p id="typing"></p>

<!-- Audio -->
<audio id="mysong">
  <source src="song.mp3.mp3" type="audio/mpeg">
</audio>

<br><br>

<button class="btn" onclick="playAll()">Click Me 💘</button>

<br><br>

<a href="#bottom" style="color:white;">Scroll Down ⬇️</a>

<div style="height:1200px;"></div>

<h2 id="bottom">I Love You Monisha 💖</h2>

<!-- Popup -->
<div id="popupBox">
  <h2>I Love You Monisha ❤️💘</h2>
  <button onclick="closePopup()">Close</button>
</div>

<!-- Heart Rain -->
<div class="heart-fall" style="left:10%;">❤️</div>
<div class="heart-fall" style="left:25%; animation-delay:1s;">❤️</div>
<div class="heart-fall" style="left:40%; animation-delay:2s;">❤️</div>
<div class="heart-fall" style="left:55%; animation-delay:3s;">❤️</div>
<div class="heart-fall" style="left:70%; animation-delay:4s;">❤️</div>
<div class="heart-fall" style="left:85%; animation-delay:5s;">❤️</div>

<script>

// Play + Popup
function playAll() {
  document.getElementById("mysong").play();
  document.getElementById("popupBox").style.display = "block";
}

// Close popup
function closePopup() {
  document.getElementById("popupBox").style.display = "none";
}

// Typing animation
let text = "My love website 😍";
let i = 0;

function typeEffect() {
  if (i < text.length) {
    document.getElementById("typing").innerHTML += text.charAt(i);
    i++;
    setTimeout(typeEffect, 100);
  }
}

typeEffect();

</script>

</body>
</html>
